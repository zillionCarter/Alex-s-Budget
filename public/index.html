<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Budget | Strategic Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/inter-ui/3.19.3/inter.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="theme-dark">
    <div id="app-container">
        <!-- Desktop Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h2>Alex's Budget</h2>
            </div>
            <ul class="nav-links">
                <li data-page="dashboard" class="active"><span>Dashboard</span></li>
                <li data-page="shifts"><span>Shifts & Income</span></li>
                <li data-page="expenses"><span>Expenses</span></li>
                <li data-page="goals"><span>Goals & Wants</span></li>
            </ul>
        </nav>

        <main id="main-content">
            <header id="page-header">
                <h1 id="view-title">DASHBOARD</h1>
                <!-- Top Nav Hub Removed as requested -->
            </header>

            <div id="view-container">
                <!-- Data Hub Injected Here -->
            </div>
        </main>

        <!-- Mobile Tab Bar (Essential for phone compatibility) -->
        <nav id="tab-bar">
            <div class="tab-item active" data-page="dashboard">Home</div>
            <div class="tab-item" data-page="shifts">Shifts</div>
            <div class="tab-item" data-page="expenses">Expenses</div>
            <div class="tab-item" data-page="goals">Goals</div>
        </nav>
    </div>

    <!-- Custom Strategic Modal -->
    <div id="goal-modal" class="modal-overlay hidden">
        <div class="modal-content card view-animate">
            <h3 id="modal-title">AUTHORIZE TARGET</h3>
            <div class="form-group" style="display:grid; gap:20px; margin-top:20px;">
                <input type="text" id="modal-goal-name" placeholder="TARGET NAME">
                <input type="number" id="modal-goal-amt" placeholder="TARGET AMOUNT ($)">
                <input type="date" id="modal-goal-deadline">
                <div style="display:flex; gap:10px;">
                    <button class="btn-primary" id="modal-save-btn" style="flex:2">AUTHORIZE</button>
                    <button class="btn-primary" id="modal-cancel-btn" style="flex:1; background:rgba(255,255,255,0.1)">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
